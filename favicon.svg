<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
    </style>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006688;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  
  <!-- Outer circle gradient stroke -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="url(#darkGradient)" stroke-width="32"/>
  <circle cx="512" cy="512" r="432" fill="none" stroke="url(#blueGradient)" stroke-width="12"/>
  
  <!-- Inner content circle -->
  <circle cx="512" cy="512" r="380" fill="#F0F5FF" opacity="0.8"/>
  
  <!-- Checkmark -->
  <g transform="translate(512, 512)">
    <!-- Line chart trend -->
    <path d="M -180 80 Q -120 20 -60 60 Q 0 -20 60 40" fill="none" stroke="url(#blueGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Bar chart -->
    <rect x="-140" y="0" width="48" height="140" fill="url(#blueGradient)" rx="12"/>
    <rect x="-60" y="-40" width="48" height="180" fill="url(#blueGradient)" rx="12"/>
    <rect x="20" y="-80" width="48" height="220" fill="url(#blueGradient)" rx="12"/>
    <rect x="100" y="-20" width="48" height="160" fill="url(#blueGradient)" rx="12"/>
    
    <!-- Up arrows on bars -->
    <g transform="translate(-116, -40)">
      <path d="M 0 0 L -12 24 L 12 24" fill="none" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="48" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="translate(-36, -80)">
      <path d="M 0 0 L -12 24 L 12 24" fill="none" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="48" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
    </g>
    <g transform="translate(124, -60)">
      <path d="M 0 0 L -12 24 L 12 24" fill="none" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="0" y2="48" stroke="#00B8D4" stroke-width="10" stroke-linecap="round"/>
    </g>
  </g>
</svg>